<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>
</head>
<body>
    <h1>Doação de Sangue</h1>
    <p>Bem-vindo à nossa plataforma de doação de sangue. Sua contribuição pode salvar vidas!</p>

    <form action="">
        <fieldset class="fundo">
            <div class="campo">
                <label for="nome">Nome completo:</label>
                <input type="text" name="nome" id="nome" required>
            </div>
        </fieldset>
        <fieldset class="fundo">
            <div class="campo">
                <label for="idade">Idade:</label>
                <input type="number" name="idade" id="idade" required>
            </div>
                    </fieldset>

                    <fieldset class="fundo">
                        <div class="campo">
                            <label for="peso">Peso:</label>
                            <input type="text" name="peso" id="peso" required>
                        </div>
                    </fieldset>
                    <fieldset class="fundo">
                        <div class="campo">
                            <label for="tipo_sanguineo">Tipo Sanguíneo:</label>
                            <select id="tipo_sanguineo" name="tipo_sanguineo">
                                <option value="">Selecione:</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </fieldset>

                    <fieldset class="fundo">
                        <div class="campo">
                        <label for="telefone">Telefone:</label>
                        <input type="tel" name="telefone" id="telefone" required>
                    </div>
                    </fieldset>
                   
                    <fieldset class="fundo">
                         <div class="campo">
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    </fieldset>

                    <fieldset class="fundo">
                        <div class="campo">
                            <label for="telefone">Telefone:</label>
                            <input type="tel" name="telefone" id="telefone" required>
                        </div>
                    </fieldset>

                    <fieldset class="fundo">
                        <div class="campo">
                            <label for="cidade">Cidade:</label>
                            <input type="text" name="cidade" id="cidade" required>
                        </div>
                    </fieldset>

                    <fieldset class="fundo">
                        <div class="campo">
                            <label for="estado">Estado:</label>
                            <input type="text" name="estado" id="estado" required>
                        </div>
                    </fieldset>
                </fieldset>

                 <button class="botao" type="submit">Enviar</button>
            </form>
</body>
<script src="script.js"></script>
<link rel="stylesheet" href="style.css">
</html>
